<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Color Tile - Multiplayer</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" type="image/png" href="./icon.png">
</head>
<body>

    <!-- 로비 화면 -->
    <div id="screen-lobby" class="screen active">
        <div class="panel">
            <h1>컬러 타일 멀티</h1>
            <p class="text-muted">
                솔플 개발이라 딜레이가 좀 있어요
                <br>
                ;ㅁ;
                <br>
                1.0.0 릴리즈!!
                <br>
                1.1.0 잘못 눌렀을때 감점 추가
                <br>
                1.1.1 0에서도 감점되는 현상 수정...
            </p>
            <br>
            <button id="btn-create-room" class="btn-secondary" style="width: 100%; padding: 15px;">방 생성</button>
            <div class="form-group" style="margin-top: 30px;">
                <input type="text" id="input-room-code" placeholder="방 코드" maxlength="4" autocomplete="off">
                <button id="btn-join-room">방 접속</button>
            </div>
        </div>
    </div>

    <!-- 대기실 화면 -->
    <div id="screen-room" class="screen">
        <div class="panel">
            <h2 id="room-title">대기실</h2>
            <p id="room-status" class="text-muted">상태 메시지</p>

            <div class="form-group" style="margin-bottom: 5px;">
                <input type="text" id="input-nickname" maxlength="10" autocomplete="off" placeholder="닉네임 변경">
                <button id="btn-save-nickname" style="background-color: #555;">저장</button>
            </div>
            <p id="nickname-status" class="text-muted" style="min-height: 20px;"></p>

            <div style="text-align: left; margin-top: 10px;">
                <h3>접속자 목록</h3>
                <ul id="player-list" class="list-box"></ul>
            </div>

            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <button id="btn-ready" class="btn-secondary" style="flex: 1;">준비</button>
                <button id="btn-start" style="display: none; flex: 1;">게임 시작</button>
            </div>
            <button id="btn-leave-room" class="btn-danger" style="width: 100%; margin-top: 15px;">로비로 돌아가기</button>
        </div>
    </div>

    <!-- 게임 화면 -->
    <div id="screen-game" class="screen">
        <div class="game-layout">

            <div id="leaderboard" class="leaderboard-v"></div>

            <div class="play-area">
                <div class="game-info-bar">
                    <div id="ui-time">Time: 120</div>
                    <div id="ui-score">Score: 0</div>
                </div>

                <div class="toggle-container">
                    <label>
                        <input type="checkbox" id="toggle-emoji">
                        <span>모양 표시</span>
                    </label>
                </div>

                <div id="game-board"></div>
            </div>

        </div>
    </div>

    <!-- 결과 화면 -->
    <div id="screen-result" class="screen">
        <h2 style="font-size: 2rem; color: var(--accent); margin-bottom: 30px;">최종 결과</h2>

        <div class="result-layout">
            <div class="result-col">
                <h3 style="text-align: center;">🏆 순위표</h3>
                <div id="result-leaderboard" style="display: flex; flex-direction: column; margin-top: 15px;"></div>
            </div>

            <div class="result-col" style="display: flex; flex-direction: column; align-items: center;">
                <h3 id="replay-title" style="color: var(--primary);">🔍 플레이어 선택</h3>

                <div id="replay-content" style="display: none; flex-direction: column; align-items: center; width: 100%; margin-top: 15px;">
                    <div class="game-info-bar" style="font-size: 1rem; margin-bottom: 0;">
                        <span id="replay-time">Time: -</span>
                        <span id="replay-score">Score: -</span>
                    </div>

                    
                    <div class="toggle-container" style="justify-content: center; margin-bottom: 15px;">
                        <label>
                            <input type="checkbox" id="toggle-emoji-replay">
                            <span>모양 표시</span>
                        </label>
                    </div>


                    <div id="replay-board"></div>
                    <input type="range" id="replay-slider" min="0" max="0" value="0" style="width: 100%; margin: 15px 0; cursor: pointer; accent-color: var(--highlight);">
                    <button id="btn-play-replay" class="btn-secondary" style="margin-top: 10px;">▶ 재생 시작</button>
                </div>
            </div>
        </div>

        <button id="btn-back-to-room" class="btn-primary" style="margin-top: 30px; width: 250px;">대기실로 돌아가기</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
